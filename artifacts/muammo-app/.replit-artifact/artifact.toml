kind = "web"
previewPath = "/"
title = "Muammo - Shahar Muammolari"
version = "1.0.0"
id = "artifacts/muammo-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23844
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/muammo-app run dev"

[services.env]
PORT = "23844"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/muammo-app", "run", "build"]
publicDir = "artifacts/muammo-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
